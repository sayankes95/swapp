<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SWAPP - Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="orb-2"></div>
    <div class="stickers">
        <span class="sticker">📚</span><span class="sticker">✏️</span>
        <span class="sticker">📝</span><span class="sticker">🎒</span>
        <span class="sticker">📖</span><span class="sticker">🔬</span>
    </div>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">🚀</div>
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Join SWAPP and start tracking your wellness</p>

            {% if error %}
            <div class="error-msg">⚠️ {{ error }}</div>
            {% endif %}

            <form action="/register" method="POST" class="auth-form">
                <div class="form-group">
                    <label>👤 Full Name</label>
                    <input type="text" name="name" placeholder="Your full name" required>
                </div>
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" name="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>🔒 Password</label>
                    <input type="password" name="password" placeholder="••••••••" required minlength="6">
                </div>
                <div class="form-group">
                    <label>🔒 Confirm Password</label>
                    <input type="password" name="confirm_password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="auth-btn">Create Account →</button>
            </form>
            <p class="auth-switch">Already have an account? <a href="/">Login here</a></p>
        </div>
    </div>
</body>
</html>
